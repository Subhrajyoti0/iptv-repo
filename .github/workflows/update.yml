name: Auto Update IPTV

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install ZEE5 deps
        run: |
          cd generators/zee5
          npm install

      - name: Run generators
        run: |
          node generators/zee5/index.js
          node generators/index-builder/index.js
``
