name: Auto Update ZEE5 Metadata

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install generator dependencies
        run: |
          cd generators/zee5
          npm install

      - name: Run generator
        run: node generators/zee5/index.js

      - name: Build indexes
        run: node generators/index-builder/index.js

      - name: Commit and push updates
        run: |
          git config user.name "iptv-bot"
          git config user.email "bot@github.com"
          git add playlists epg
          git commit -m "Auto update ZEE5 metadata and EPG" || exit 0
          git push
