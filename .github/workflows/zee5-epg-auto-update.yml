name: Zee5 EPG Auto Update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate Zee5 EPG
        run: node generators/zee5/index.js

      - name: Run safe patcher
        run: node patcher/patcher.js

      - name: Abort if XML empty
        run: |
          if ! grep -q "<programme" output/zee5.xml; then
            echo "❌ XML empty — aborting push"
            exit 1
          fi

      - name: Remove runtime resume file
        run: |
          rm -f output/zee5_progress.json

      - name: Commit & Push
        run: |
          git config user.name "zee5-epg-bot"
          git config user.email "zee5-epg-bot@users.noreply.github.com"

          git add output/zee5.xml \
                  output/zee5_raw_epg.json \
                  output/zee5_normalized_epg.json \
                  patcher/patch_log.json \
                  patcher/review.json \
                  patcher/channel_rename_history.json

          git commit -m "Auto-update Zee5 EPG (6h)" || echo "No changes"
          git push
